name: Gatling performance test run

on:
  workflow_dispatch:
    inputs:
      envName:
        description: "Which API should this run against"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
      profile:
        description: "Optional Which profile to run."
        required: false
        default: "happypath"
        type: choice
        options:
          - local
          - smoke
          - happypath
jobs:
  gatling-run:
    name: Run Gatling simulations
    runs-on: [ self-hosted, hmpps-github-actions-runner ]
    permissions:
      contents: read
      actions: read
    timeout-minutes: 60
    env:
      CLIENT_ID: ${{ secrets.GATLING_CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.GATLING_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Touch env file
        run: touch ./gatling/.env

      - name: Start Gatling
        env:
          CLIENT_ID: ${{ secrets.GATLING_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GATLING_CLIENT_SECRET }}
        run: |
          export PROFILE_FQN="${{ github.event.inputs.profile }}"
          export ENV_NAME="${{ github.event.inputs.envName }}"
          
          ENV_NAME="${ENV_NAME:-dev}"
          
          set -eo pipefail
          ARGS=("--no-daemon")
          ARGS+=("--stacktrace")
          ARGS+=("gatlingRunCi")
          
          if [ -n "${{ github.event.inputs.profile }}" ]; then
              ARGS+=("-Dprofile=$PROFILE_FQN")
          fi
          ARGS+=("-Denv=$ENV_NAME")
          
          export CLIENT_ID="${CLIENT_ID}"
          export CLIENT_SECRET="${CLIENT_SECRET}"
          echo "Running: ./gradlew ${ARGS[*]}"
          CLIENT_ID="${CLIENT_ID}" CLIENT_SECRET="${CLIENT_SECRET}" ./gradlew "${ARGS[@]}"


      - name: Upload Gatling reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gatling-reports
          path: |
            gatling/build/reports/gatling/**
            **/build/reports/gatling/**
          if-no-files-found: warn