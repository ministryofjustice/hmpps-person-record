name: Gatling performance test run

on:
  push:
    branches: [ "cpr-load-test" ]
  workflow_dispatch:
    inputs:
      envName:
        description: "Which API should this run against"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
      profile:
        description: "Optional fully-qualified simulation class to run."
        required: false
        default: "happypath"
        type: choice
        options:
          - local
          - smoke
          - happypath
jobs:
  gatling-run:
    name: Run Gatling simulations
    runs-on: [ self-hosted, hmpps-github-actions-runner ]
    permissions:
      contents: read
      actions: read
    timeout-minutes: 60
    env:
      CLIENT_ID: ${{ secrets.GATLING_CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.GATLING_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Touch env file
        run: touch ./gatling/.env

      - name: Debug Auth access
        env:
          CLIENT_ID: ${{ secrets.GATLING_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GATLING_CLIENT_SECRET }}
        run: |
          ID_SECRET="${CLIENT_ID}:${CLIENT_SECRET}"
          echo "ID secret length: ${#ID_SECRET}"
          echo "ID secret: ${ID_SECRET}"
          
          B64_AUTH=$(printf "%s" "$ID_SECRET" | base64 | tr -d '\n\r ')
          
          echo "B64_AUTH length: ${#B64_AUTH}"
          echo "B64_AUTH: ${B64_AUTH}"
          
          curl -i -X POST "https://sign-in-dev.hmpps.service.justice.gov.uk/auth/oauth/token?grant_type=client_credentials" -H 'Content-Type: application/json' -H "Authorization: Basic $B64_AUTH"
          




      - name: Debug Auth access - auth
        id: get_token
        shell: bash
        env:
          CLIENT_ID: ${{ secrets.GATLING_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GATLING_CLIENT_SECRET }}
        run: |
          BASIC_AUTH=$(echo -n "$CLIENT_ID:$CLIENT_SECRET" | base64 | tr -d '\n')
          RESPONSE=$(curl --fail-with-body --verbose -s -X POST "https://sign-in-dev.hmpps.service.justice.gov.uk/auth/oauth/token?grant_type=client_credentials" \
            -H "Content-Type: application/json" \
            -H "Authorization: Basic $BASIC_AUTH")
          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Failed to extract access token."
            echo "Response was: $RESPONSE"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT


      - name: Start Gatling
        env:
          CLIENT_ID: ${{ secrets.GATLING_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GATLING_CLIENT_SECRET }}
        run: |
          export PROFILE_FQN="${{ github.event.inputs.profile }}"
          export ENV_NAME="${{ github.event.inputs.envName }}"
          
          ENV_NAME="${ENV_NAME:-dev}"
          
          set -eo pipefail
          ARGS=("--no-daemon")
          ARGS+=("--stacktrace")
          ARGS+=("gatlingRunCi")
          
          if [ -n "${{ github.event.inputs.profile }}" ]; then
              ARGS+=("-Dprofile=$PROFILE_FQN")
          fi
          ARGS+=("-Denv=$ENV_NAME")
          
          echo "CLIENT_ID length: ${#CLIENT_ID}"
          echo "CLIENT_SECRET length: ${#CLIENT_SECRET}"
          
          export CLIENT_ID="${CLIENT_ID}"
          export CLIENT_SECRET="${CLIENT_SECRET}"
          echo "Running: ./gradlew ${ARGS[*]}"
          CLIENT_ID="${CLIENT_ID}" CLIENT_SECRET="${CLIENT_SECRET}" ./gradlew "${ARGS[@]}"


      - name: Upload Gatling reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: gatling-reports
          path: |
            gatling/build/reports/gatling/**
            **/build/reports/gatling/**
          if-no-files-found: warn