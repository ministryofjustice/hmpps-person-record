components:
  schemas:
    MergePersonRequest:
      type: object
      properties:
        mergeFromPrisonNumber:
          type: string
          format: "A1234BC"
        syncPersonRequest:
          $ref: '#/components/schemas/SyncPersonRequest'

    SyncPersonRequest:
      type: object
      properties:
        demographicAttributes:
          $ref: '#/components/schemas/DemographicAttributes'
        personContacts:
          type: array
          items:
            $ref: '#/components/schemas/PersonContact'
        pseudonym:
          type: array
          description: List of pseudonyms for the person.
          items:
            $ref: '#/components/schemas/Pseudonym'
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'
        sentences:
          type: array
          items:
            $ref: '#/components/schemas/Sentence'
      required:
      # - demographicAttributes

    DemographicAttributes:
      type: object
      properties:
        birthPlace:
          type: string
        birthCountryCode:
          type: string
        ethnicityCode:
          type: string
        sexualOrientation:
          type: string
        disability:
          type: boolean
        interestToImmigration:
          type: boolean
        religionCode:
          type: string
        nationalityCode:
          type: string
        nationalityNote:
          type: string

    PersonContact:
      type: object
      properties:
        nomisPersonContactId:
          type: string
        value:
          type: string
        type:
          type: string
          description: Contact type (e.g. HOME, EMAIL, PHONE).
        extension:
          type: string
          nullable: true
      required:
        - nomisPersonContactId
        - value
        - type

    Pseudonym:
      type: object
      properties:
        nomisPseudonymId:
          type: string
        titleCode:
          type: string
        firstName:
          type: string
        middleNames:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: string
          format: date
        sexCode:
          type: string
        isPrimary:
          type: boolean
        identifiers:
          type: array
          items:
            $ref: '#/components/schemas/Identifier'
      required:
        - nomisPseudonymId
        - firstName
        - lastName
        - dateOfBirth
        - sexCode
        - isPrimary

    Identifier:
      type: object
      properties:
        nomisIdentifierId:
          type: string
        type:
          type: string
        value:
          type: string
        comment:
          type: string

    Address:
      type: object
      properties:
        nomisAddressId:
          type: string
        fullAddress:
          type: string
        noFixedAbode:
          type: boolean
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
        postcode:
          type: string
        subBuildingName:
          type: string
        buildingName:
          type: string
        buildingNumber:
          type: string
        thoroughfareName:
          type: string
        dependentLocality:
          type: string
        postTown:
          type: string
        county:
          type: string
        countryCode:
          type: string
        comment:
          type: string
        isPrimary:
          type: boolean
        isMail:
          type: boolean
        addressUsage:
          type: array
          items:
            $ref: '#/components/schemas/AddressUsage'
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/AddressContact'
      required:
        - nomisAddressId
        - noFixedAbode
        - isPrimary
        - isMail

    AddressUsage:
      type: object
      properties:
        nomisAddressUsageId:
          type: string
        addressUsageCode:
          type: string
        isActive:
          type: boolean

    AddressContact:
      type: object
      properties:
        nomisAddressContactId:
          type: string
        type:
          type: string
        value:
          type: string
        extension:
          type: string

    Sentence:
      type: object
      properties:
        sentenceDate:
          type: string
          format: date

    SyncPersonResponse:
      type: object
      properties:
        prisonNumber:
          type: string
        addressMappings:
          type: array
          items:
            $ref: '#/components/schemas/AddressMapping'
        personContactMappings:
          type: array
          items:
            $ref: '#/components/schemas/PersonContactMapping'
        pseudonymMappings:
          type: array
          items:
            $ref: '#/components/schemas/PseudonymMapping'
      required:
        - prisonNumber

    AddressMapping:
      type: object
      properties:
        nomisAddressId:
          type: string
        cprAddressId:
          type: string
          format: uuid
        addressUsageMappings:
          type: array
          items:
            $ref: '#/components/schemas/AddressUsageMapping'
        addressContactMappings:
          type: array
          items:
            $ref: '#/components/schemas/AddressContactMapping'

    AddressUsageMapping:
      type: object
      properties:
        nomisAddressUsageId:
          type: string
        cprAddressUsageid:
          type: string
          format: uuid

    AddressContactMapping:
      type: object
      properties:
        nomisContactId:
          type: string
        cprContactId:
          type: string
          format: uuid

    PersonContactMapping:
      type: object
      properties:
        nomisContactId:
          type: string
        cprContactId:
          type: string
          format: uuid

    PseudonymMapping:
      type: object
      properties:
        nomisPseudonymId:
          type: string
        cprPseudonymId:
          type: string
          format: uuid
        identifierMappings:
          type: array
          items:
            $ref: '#/components/schemas/IdentifierMapping'

    IdentifierMapping:
      type: object
      properties:
        nomisIdentifierId:
          type: string
        cprIdentifierId:
          type: string
          format: uuid
