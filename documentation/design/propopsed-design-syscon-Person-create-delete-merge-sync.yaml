  /person/prison/{toPrisonNumber}/merge:
    post:
      summary: Sync person data into CPR from NOMIS
      description: >
        Synchronises a prisoner's demographics, contacts, pseudonyms, addresses and sentences from NOMIS into the CPR using the prisoner’s prison number as the key. Returns mappings between NOMIS IDs and CPR IDs.
      operationId: mergePerson
      parameters:
        - name: toPrisonNumber
          in: path
          required: true
          description: Prison number of the person to merge (e.g. A1234BC).
          schema:
            type: string
            format: "A1234BC"
      requestBody:
        required: true
        description: Person data to be synchronised from NOMIS to CPR.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MergePersonRequest'
            examples:
              default:
                summary: Example person sync request
                value:
                  mergeFromPrisonNumber: "A6443EG"
                  demographicAttributes:
                    birthPlace: "Milton Keynes"
                    birthCountryCode: "UK"
                    ethnicityCode: "W1"
                    sexualOrientation: "HET"
                    disability: false
                    interestToImmigration: false
                    religionCode: "MOS"
                    nationalityCode: "GB"
                    nationalityNote: "Possibly Finnish"
                  personContacts:
                    - nomisPersonContactId: "1234"
                      value: "01234567890"
                      type: "HOME"
