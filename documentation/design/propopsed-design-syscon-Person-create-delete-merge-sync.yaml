openapi: 3.0.1
info:
  title: Person Create / Delete / Sync / Merge API
  version: 1.0.0
  description: API for creating, updating, and retrieving prisoner religion details and CPR/NOMIS mappings.

tags:
  - name: Person
    description: Endpoints for person in prison

paths:
  /person/prison/{prisonNumber}:
    post:
      summary: Create a person into CPR from NOMIS
      description: >
        Creates a prisoner's demographics, contacts, pseudonyms, addresses and sentences
        from NOMIS into the CPR using the prisoner’s prison number as the key. Returns mappings between NOMIS IDs and CPR IDs.
      operationId: createPerson
      parameters:
        - name: prisonNumber
          in: path
          required: true
          description: Prison number of the person to synchronise (e.g. A1234BC).
          schema:
            type: string
      requestBody:
        required: true
        description: Person data to be synchronised from NOMIS to CPR.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncPersonRequest'
            examples:
              default:
                summary: Example person sync request
                value:
                  demographicAttributes:
                    birthPlace: "Milton Keynes"
                    birthCountryCode: "UK"
                    ethnicityCode: "W1"
                    sexualOrientation: "HET"
                    disability: false
                    interestToImmigration: false
                    religionCode: "MOS"
                    nationalityCode: "GB"
                    nationalityNote: "Possibly Finnish"
                  personContacts:
                    - nomisPersonContactId: "1234"
                      value: "01234567890"
                      type: "HOME"
                      extension: "235"
                    - nomisPersonContactId: "1235"
                      value: "abc@def.xyz"
                      type: "EMAIL"
                      extension: null
                  pseudonym:
                    - nomisPseudonymId: "2378"
                      titleCode: "MR"
                      firstName: "John"
                      middleNames: "Jimmy Jane"
                      lastName: "Smith"
                      dateOfBirth: "1980-01-01"
                      sexCode: "M"
                      isPrimary: true
                      identifiers:
                        - nomisIdentifierId: "2333"
                          type: "PNC"
                          value: "2000/1234567A"
                          comment: "Test comment"
                    - nomisPseudonymId: "2379"
                      titleCode: "MR"
                      firstName: "Jon"
                      middleNames: "James"
                      lastName: "Smythe"
                      dateOfBirth: "1980-01-01"
                      sexCode: "M"
                      isPrimary: false
                      identifiers:
                        - nomisIdentifierId: "2478"
                          type: "PNC"
                          value: "2000/1234567A"
                          comment: "Test comment2"
                        - nomisIdentifierId: "2479"
                          type: "NINO"
                          value: "SC344857F"
                          comment: "Test comment3"
                  addresses:
                    - nomisAddressId: "5677"
                      fullAddress: "Sub building 2, Main Building, 102 Petty France, Westminster, London, Greater London, SW1H 9AJ"
                      noFixedAbode: false
                      startDate: "2020-02-26"
                      endDate: "2023-07-15"
                      postcode: "SW1H 9AJ"
                      subBuildingName: "Sub building 2"
                      buildingName: "Main Building"
                      buildingNumber: "102"
                      thoroughfareName: "Petty France"
                      dependentLocality: "Westminster"
                      postTown: "London"
                      county: "Greater London"
                      countryCode: "UK"
                      comment: "String"
                      isPrimary: true
                      isMail: true
                      addressUsage:
                        - nomisAddressUsageId: "5678"
                          addressUsageCode: "DSH"
                          isActive: true
                      contacts:
                        - nomisAddressContactId: "5679"
                          type: "PHONE"
                          value: "+44 20 7946 0000"
                          extension: "1234"
                  sentences:
                    - sentenceDate: "1980-01-01"
      responses:
        '200':
          description: Person data synchronised successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncPersonResponse'
              examples:
                default:
                  summary: Example person sync response
                  value:
                    prisonNumber: "A6443EG"
                    addressMappings:
                      - nomisAddressId: "5677"
                        cprAddressId: "0b6f8655-278a-4cb8-81c6-21364a91c466"
                        addressUsageMappings:
                          - nomisAddressUsageId: "5678"
                            cprAddressUsageid: "d4ae7071-58ae-42f0-bf5d-c69289fb1e6d"
                        addressContactMappings:
                          - nomisContactId: "5679"
                            cprContactId: "e34a39e9-c22a-44c3-87ae-ab5017f465c3"
                    personContactMappings:
                      - nomisContactId: "1234"
                        cprContactId: "88ce729e-34b5-401c-a4fc-8ca94df9f24a"
                      - nomisContactId: "1235"
                        cprContactId: "7c168caf-013e-482c-a0dc-79d378b248f0"
                    pseudonymMappings:
                      - nomisPseudonymId: "2378"
                        cprPseudonymId: "be3fb82f-fe3f-474c-8cbe-2170dec7d422"
                        identifierMappings:
                          - nomisIdentifierId: "2477"
                            cprIdentifierId: "684125bb-49dc-491b-a185-3d0f706f4541"
                      - nomisPseudonymId: "2379"
                        cprPseudonymId: "ff41fec8-65e2-476d-a5eb-d209869d72c2"
                        identifierMappings:
                          - nomisIdentifierId: "2478"
                            cprIdentifierId: "b7bb703f-d55e-419d-9126-b37ceb6e1b9d"
                          - nomisIdentifierId: "2479"
                            cprIdentifierId: "cfa14df6-9044-4532-8590-96f1589ebfaf"
        '400':
          description: Invalid request payload.
        '404':
          description: Prisoner not found.
        '500':
          description: Unexpected server error.

    # /person/prison/{prisonNumber}:
    delete:
      summary: Delete a person from CPR using NOMIS id
      description: >
        Deletes a person from CPR using the NOMIS id
      operationId: deletePerson
      parameters:
        - name: prisonNumber
          in: path
          required: true
          description: Prison number of the person to synchronise (e.g. A1234BC).
          schema:
            type: string

      responses:
        '200':
          description: Person data deleted successfully.
        '400':
          description: Invalid request payload.
        '404':
          description: Prisoner not found.
        '500':
          description: Unexpected server error.


